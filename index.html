<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein Lang Hub</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Mein Lang Hub</h1>
      <p>Browse open texts by language and category</p>
    </header>

    <main class="container" aria-label="Text explorer">
      <section class="panel">
        <div class="top-bar">
          <button id="backButton" type="button" class="back-button" hidden>Back</button>
          <p id="stepLabel" class="step-label">Languages</p>
        </div>

        <h2 id="viewTitle">Select a language</h2>
        <p id="pathText" class="path-text">Path: /texts</p>

        <div id="searchWrap" class="search-wrap">
          <label for="searchInput">Search</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Search in this list"
            autocomplete="off"
          />
        </div>

        <p id="errorMessage" class="error-message" hidden></p>

        <section id="listView" aria-labelledby="viewTitle">
          <div id="cardGrid" class="card-grid" role="list"></div>
          <p id="listPlaceholder" class="placeholder" hidden>No items to show.</p>
        </section>

        <article id="contentView" class="content-view" hidden>
          <h3 id="contentMeta" class="content-meta">Text content</h3>
          <pre id="contentArea" class="content-area">Select a file to read.</pre>
        </article>
      </section>
    </main>

    <div id="importModal" class="modal-overlay" hidden>
      <div class="modal-backdrop" data-modal-close="true"></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
        <div class="modal-head">
          <h3 id="importModalTitle">Import Texts</h3>
          <button id="importCloseButton" type="button" class="modal-close" aria-label="Close import popup">
            ×
          </button>
        </div>

        <p id="importTargetLabel" class="modal-target"></p>
        <p id="importEndpointHint" class="modal-endpoint"></p>

        <form id="importForm" class="modal-form" novalidate>
          <div id="importAuthFields" class="auth-fields">
            <label for="importEmail">Email</label>
            <input id="importEmail" type="email" autocomplete="email" />

            <label for="importPassword">Password</label>
            <input id="importPassword" type="password" autocomplete="current-password" />
          </div>

          <label class="terms-row" for="importTerms">
            <input id="importTerms" type="checkbox" />
            <span>I accept terms and conditions.</span>
          </label>

          <p id="importStatus" class="import-status" hidden></p>

          <div id="importLoader" class="import-loader" hidden>
            <span class="loader-spinner" aria-hidden="true"></span>
            <span>Submitting files...</span>
          </div>

          <div class="modal-actions">
            <button id="importCancelButton" type="button" class="secondary-button">Cancel</button>
            <button id="importSubmitButton" type="submit" class="primary-button">Start import</button>
          </div>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
