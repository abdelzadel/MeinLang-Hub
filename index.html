<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein Lang Hub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Mein Lang Hub</h1>
      <p>Browse open texts by language and category</p>
    </header>

    <main class="app" aria-label="Mein Lang Hub Browser">
      <section class="panel browser-panel" aria-labelledby="stepTitle">
        <div class="panel-head">
          <button id="backButton" class="back-button" type="button" hidden>
            Back
          </button>
          <div>
            <p id="stepLabel" class="step-label">Step 1 of 3</p>
            <h2 id="stepTitle">Select a language</h2>
          </div>
        </div>

        <div class="search-group">
          <label for="searchInput">Search</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Search current list"
            autocomplete="off"
            aria-describedby="stepHint"
          />
          <p id="stepHint" class="hint-text">Choose a language card to continue.</p>
        </div>

        <div id="cardGrid" class="card-grid" role="list" aria-live="polite"></div>
        <p id="cardsPlaceholder" class="placeholder" hidden>
          No items to show.
        </p>
      </section>

      <section class="panel reader-panel" aria-labelledby="readerTitle">
        <h2 id="readerTitle">Reader</h2>

        <div class="selection-summary" aria-live="polite">
          <p><strong>Language:</strong> <span id="selectedLanguage">None</span></p>
          <p><strong>Category:</strong> <span id="selectedSubfolder">None</span></p>
          <p><strong>Text:</strong> <span id="selectedFile">None</span></p>
        </div>

        <article id="contentArea" class="content" tabindex="0">
          Select a text card in step 3 to read content here.
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
