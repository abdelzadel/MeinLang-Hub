<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein Lang Hub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Mein Lang Hub</h1>
      <p>Browse open texts by language and category</p>
    </header>

    <main class="container" aria-label="Text explorer">
      <section class="panel">
        <div class="top-bar">
          <button id="backButton" type="button" class="back-button" hidden>Back</button>
          <p id="stepLabel" class="step-label">Languages</p>
        </div>

        <h2 id="viewTitle">Select a language</h2>
        <p id="pathText" class="path-text">Path: /texts</p>

        <div id="searchWrap" class="search-wrap">
          <label for="searchInput">Search</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Search in this list"
            autocomplete="off"
          />
        </div>

        <p id="errorMessage" class="error-message" hidden></p>

        <section id="listView" aria-labelledby="viewTitle">
          <div id="cardGrid" class="card-grid" role="list"></div>
          <p id="listPlaceholder" class="placeholder" hidden>No items to show.</p>
        </section>

        <article id="contentView" class="content-view" hidden>
          <h3 id="contentMeta" class="content-meta">Text content</h3>
          <pre id="contentArea" class="content-area">Select a file to read.</pre>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
