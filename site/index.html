<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein Lang Hub</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Mein Lang Hub</h1>
      <p>Browse open texts by language and category</p>
    </header>

    <main class="layout" aria-label="Text browser">
      <section class="panel controls-panel" aria-labelledby="browse-title">
        <h2 id="browse-title">Browse</h2>

        <div class="field">
          <label for="languageSelect">Language</label>
          <select id="languageSelect">
            <option value="">Select a language</option>
          </select>
        </div>

        <div class="field">
          <label for="subfolderSelect">Category</label>
          <select id="subfolderSelect" disabled>
            <option value="">Select a category</option>
          </select>
        </div>

        <div class="field">
          <label for="searchInput">Search texts</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Type to filter text names"
            autocomplete="off"
            disabled
          />
        </div>

        <section class="files-section" aria-labelledby="files-title">
          <h3 id="files-title">Texts</h3>
          <ul id="fileList" class="file-list" aria-live="polite"></ul>
          <p id="listPlaceholder" class="placeholder">
            Select a language and category to see available texts.
          </p>
        </section>
      </section>

      <section class="panel reader-panel" aria-labelledby="reader-title">
        <h2 id="reader-title">Reader</h2>

        <div class="selection-summary" aria-live="polite">
          <p><strong>Language:</strong> <span id="selectedLanguage">None</span></p>
          <p><strong>Category:</strong> <span id="selectedSubfolder">None</span></p>
          <p><strong>Text:</strong> <span id="selectedFile">None</span></p>
        </div>

        <article id="contentArea" class="content" tabindex="0">
          Select a text to read its content here.
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
